clear

// hud
scr_clock 2
scr_showfps 1
scr_match_hud 0
crosshair 5
scr_crosshairscale 1.5
scr_crosshaircolor 0

// console
scr_conspeed 999999
scr_conalpha "1"

// video
r_shadows 1
gl_lightning_alpha ".5"

// keys
//bind \ "screenshot jpg 100" // format tga, png also avail, 100 is quality setting
bind q "impulse 7 8 5 4 3 2" // pull out the best gun available at the moment
bind e "impulse 6" // grenade launcher
bind mouse2 "impulse 8 5 4 3 2" // pull best weap not a rocket
bind f "say_team %p @ %l %z" // print location to team chat
bind z "echo Quicksaving...; wait; save quick"
bind p "pause"
bind f1 "music track01"
bind f2 "music track02"
bind f3 "music track03"
bind f4 "music track04"
bind f5 "music track05"
bind f6 "music track06"
bind f7 "music track07"
bind f8 "music track08"
bind f9 "music track09"
bind f10 "music track10"
bind f11 "music track11"
bind f12 "music track12"

// bots
bind "\" "impulse 104" // for loading waypoint editing
bind 0 "impulse 10" // for exiting waypoint menu
bind "INS" "impulse 110" // add bot
bind "DEL" "impulse 111" // add bot to other team
bind "BACKSPACE" "impulse 102" // remove bot
saved1 0 // bots don't persist between games

// settings
teamplay 1
deathmatch 1
coop 0
noexit 0
fraglimit 50
skill 3

// includes
exec maps.cfg